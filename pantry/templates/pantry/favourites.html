{% extends 'base.html' %}

{% block title %}Favourites – StockPot{% endblock %}

{% block content %}
<div class="container py-4">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0">My Favourites</h4>
  </div>

  <div id="alert-area"></div>

  <!-- Loading spinner -->
  <div id="loading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <!-- Recipe cards -->
  <div class="row g-4" id="favourites-grid"></div>

  <!-- Empty state -->
  <div id="empty-state" class="text-center text-muted py-5 d-none">
    <p class="mb-1 fs-5">No saved recipes yet.</p>
    <p class="small">Browse <a href="/recipes/">Recipe Suggestions</a> and save meals you want to make again.</p>
  </div>

</div>
{% endblock %}

{% block extra_js %}
<script>
  const FAVOURITES_URL = '/api/favourites/';

  function showAlert(msg, type = 'danger') {
    document.getElementById('alert-area').innerHTML =
      `<div class="alert alert-${type} alert-dismissible fade show" role="alert">
        ${msg}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
       </div>`;
  }

  async function removeFavourite(recipeId, cardEl) {
    const resp = await fetch(`${FAVOURITES_URL}${recipeId}/`, {
      method: 'DELETE',
      credentials: 'same-origin',
      headers: { 'X-CSRFToken': getCsrf() },
    });
    if (resp.ok || resp.status === 204) {
      cardEl.remove();
      if (!document.getElementById('favourites-grid').children.length) {
        document.getElementById('empty-state').classList.remove('d-none');
      }
    } else {
      showAlert('Could not remove recipe. Please try again.');
    }
  }

  function renderFavourites(recipes) {
    const grid = document.getElementById('favourites-grid');
    const empty = document.getElementById('empty-state');
    grid.innerHTML = '';

    if (!recipes.length) {
      empty.classList.remove('d-none');
      return;
    }

    recipes.forEach(r => {
      const detailUrl = `/recipes/${r.recipe_id}/`;
      const imgHtml = r.image
        ? `<img src="${r.image}" class="card-img-top" alt="${r.title}" style="height:180px;object-fit:cover;">`
        : `<div class="bg-light d-flex align-items-center justify-content-center" style="height:180px;">
             <span class="text-muted">No image</span>
           </div>`;

      const col = document.createElement('div');
      col.className = 'col-sm-6 col-lg-4';
      col.dataset.recipeId = r.recipe_id;
      col.innerHTML = `
        <div class="card h-100 shadow-sm">
          <a href="${detailUrl}" class="text-decoration-none text-dark">${imgHtml}</a>
          <div class="card-body d-flex flex-column">
            <h6 class="card-title fw-semibold mb-3">
              <a href="${detailUrl}" class="text-decoration-none text-dark">${r.title}</a>
            </h6>
            <div class="mt-auto d-flex gap-2">
              <a href="${detailUrl}" class="btn btn-sm btn-outline-primary flex-grow-1">View Recipe</a>
              <button class="btn btn-sm btn-outline-danger" onclick="removeFavourite(${r.recipe_id}, this.closest('.col-sm-6'))">
                &#9825; Remove
              </button>
            </div>
          </div>
        </div>`;
      grid.appendChild(col);
    });
  }

  async function loadFavourites() {
    try {
      const resp = await fetch(FAVOURITES_URL, { credentials: 'same-origin' });
      if (resp.status === 401 || resp.status === 403) {
        window.location.href = '/login/';
        return;
      }
      const data = await resp.json();
      document.getElementById('loading').classList.add('d-none');
      if (!resp.ok) {
        showAlert(data.detail || 'Could not load favourites.');
        return;
      }
      renderFavourites(data.results ?? data);
    } catch {
      document.getElementById('loading').classList.add('d-none');
      showAlert('Could not reach the server. Please check your connection.');
    }
  }

  loadFavourites();

  document.getElementById('logout-link').addEventListener('click', e => {
    e.preventDefault();
    fetch('/api/auth/logout/', {
      method: 'POST',
      credentials: 'same-origin',
      headers: { 'X-CSRFToken': getCsrf() },
    }).then(() => { window.location.href = '/login/'; });
  });
</script>
{% endblock %}
