name: CI

# Triggered on every Pull Request targeting the main branch.
on:
  pull_request:
    branches:
      - main

# Cancel any in-progress CI run for the same branch when a new commit is pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Python linting: PEP 8 via Flake8
  lint-python:
    name: Python Lint (Flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Flake8
        run: pip install flake8==7.2.0

      - name: Run Flake8
        run: flake8 .

  # Frontend linting: ESLint
  # Skipped if no JS files are present yet
  lint-frontend:
    name: Frontend Lint (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Detect JavaScript files
        id: detect-js
        run: |
          if find . -name "*.js" \
               -not -path "*/node_modules/*" \
               -not -path "*/.github/*" \
               -not -path "*/staticfiles/*" | grep -q .; then
            echo "has_js=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_js=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v6
        if: steps.detect-js.outputs.has_js == 'true'
        with:
          node-version: "20"

      - name: Install ESLint and run
        if: steps.detect-js.outputs.has_js == 'true'
        run: |
          npm install --save-dev eslint @eslint/js
          npx eslint . --ext .js

      - name: No JavaScript files to lint
        if: steps.detect-js.outputs.has_js == 'false'
        run: echo "No JavaScript files found — skipping ESLint."

  # Static Application Security Testing: Bandit
  sast:
    name: Security Scan (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Bandit
        run: pip install bandit==1.8.3

      - name: Run Bandit (medium severity and above)
        # Exclude migrations, tests (hardcoded fixtures), and local files
        run: |
          bandit -r . \
            --exclude ./pantry/migrations,./pantry/tests,./local_files \
            -ll

  # Automated tests and coverage gate. Uses a temporary PostgreSQL service container.
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: stockpot_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost"
      DB_NAME: stockpot_test
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: "5432"
      DATABASE_URL: "postgres://postgres:postgres@localhost:5432/stockpot_test"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run migrations
        run: python manage.py migrate --no-input

      - name: Run test suite with coverage
        run: |
          pytest \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report-${{ github.sha }}
          path: coverage.xml

  # Docker build verification. Only runs after all other jobs pass
  build:
    name: Docker Dry-Run Build
    runs-on: ubuntu-latest
    needs: [lint-python, lint-frontend, sast, test]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6
      - name: Build Docker image (Dry Run)
        run: docker build -t stockpot-dry-run .
