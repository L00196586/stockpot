name: CD

on:
  push:
    branches: [ "main" ]

# If two PRs are merged, they deploy sequentially rather than going over each other in a race condition.
concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false


jobs:
  build-and-push:
    name: Docker Build adn Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Convert repository name to lowercase
        run: echo "REPO_LC=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Extract metadata and SHA tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=long

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Generates the SBOM and attaches it directly to the image in GHCR
          sbom: true
          provenance: true
          # Layer caching via GitHub Actions cache
          cache-from: type=gha
          cache-to: type=gha,mode=max
