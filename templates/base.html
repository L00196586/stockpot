<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}StockPot{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="{% block body_class %}{% endblock %}">

{% block page_heading %}{% endblock %}


<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom px-4">
  <a class="navbar-brand fw-bold" href="/pantry/">StockPot</a>
  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navbarNav">
    <ul class="navbar-nav ms-auto">
      <li class="nav-item"><a class="nav-link" href="/pantry/">My Stock</a></li>
      <li class="nav-item"><a class="nav-link" href="/recipes/">Recipes</a></li>
      <li class="nav-item"><a class="nav-link" href="/profile/">Profile</a></li>
      <li class="nav-item"><a class="nav-link" href="#" id="logout-link">Log out</a></li>
    </ul>
  </div>
</nav>

{% block content %}{% endblock %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script>
  // Available to all pages. Reads from rendered {% csrf_token %} first, falls back to cookie.
  function getCsrf() {
    const token = document.querySelector('[name=csrfmiddlewaretoken]');
    if (token) return token.value;
    const match = document.cookie.match(/(?:^|;\s*)csrftoken=([^;]+)/);
    return match ? decodeURIComponent(match[1]) : '';
  }
</script>

{% block extra_js %}{% endblock %}

</body>
</html>
