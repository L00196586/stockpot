<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create account – StockPot</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="card shadow-sm" style="width: 100%; max-width: 440px;">
    <div class="card-body p-4">

      <h1 class="h4 mb-1 fw-bold">StockPot</h1>
      <p class="text-muted mb-4">Create your account</p>

      <div id="alert" class="alert d-none" role="alert"></div>

      <form id="register-form" novalidate>
        {% csrf_token %}
        <div class="mb-3">
          <label for="email" class="form-label">Email address</label>
          <input type="email" class="form-control" id="email" name="email"
                 placeholder="you@example.com" required autocomplete="email">
          <div class="invalid-feedback" id="email-error"></div>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control" id="password" name="password"
                 placeholder="Password" required autocomplete="new-password">
          <div class="invalid-feedback" id="password-error"></div>
        </div>

        <div class="mb-4">
          <label for="password2" class="form-label">Confirm password</label>
          <input type="password" class="form-control" id="password2" name="password2"
                 placeholder="Repeat your password" required autocomplete="new-password">
          <div class="invalid-feedback" id="password2-error"></div>
        </div>

        <button type="submit" class="btn btn-primary w-100" id="submit-btn">
          Create account
        </button>
      </form>

    </div>
  </div>
</div>

<script>
  const form = document.getElementById('register-form');
  const submitBtn = document.getElementById('submit-btn');
  const alertBox = document.getElementById('alert');

  function getCsrf() {
    return document.querySelector('[name=csrfmiddlewaretoken]').value;
  }

  function clearErrors() {
    alertBox.className = 'alert d-none';
    alertBox.textContent = '';
    form.querySelectorAll('.form-control').forEach(el => {
      el.classList.remove('is-invalid', 'is-valid');
    });
    document.querySelectorAll('.invalid-feedback').forEach(el => {
      el.textContent = '';
    });
  }

  function showFieldError(fieldName, messages) {
    const input = document.getElementById(fieldName);
    const errorEl = document.getElementById(fieldName + '-error');
    if (input) input.classList.add('is-invalid');
    if (errorEl) errorEl.textContent = Array.isArray(messages) ? messages.join(' ') : messages;
  }

  function showAlert(message, type = 'danger') {
    alertBox.className = `alert alert-${type}`;
    alertBox.textContent = message;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearErrors();

    const payload = {
      email: document.getElementById('email').value.trim(),
      password: document.getElementById('password').value,
      password2: document.getElementById('password2').value,
    };

    submitBtn.disabled = true;
    submitBtn.textContent = 'Creating account…';

    try {
      const response = await fetch('/api/auth/register/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': getCsrf(),
        },
        body: JSON.stringify(payload),
      });

      const data = await response.json();

      if (response.ok) {
        form.classList.add('d-none');
        showAlert(`Account created for ${data.email}. You can now log in.`, 'success');
      } else {
        // Map field-level errors returned by DRF back to the form inputs.
        const fieldNames = ['email', 'password', 'password2'];
        let hasFieldError = false;
        fieldNames.forEach(field => {
          if (data[field]) {
            showFieldError(field, data[field]);
            hasFieldError = true;
          }
        });
        // Fall back to a generic alert for non-field errors.
        if (!hasFieldError) {
          const msg = data.detail || data.non_field_errors?.join(' ') || 'Registration failed. Please try again.';
          showAlert(msg);
        }
      }
    } catch {
      showAlert('A network error occurred. Please check your connection and try again.');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Create account';
    }
  });
</script>

</body>
</html>
